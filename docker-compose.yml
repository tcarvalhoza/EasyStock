version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: easystock_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - easystock_network
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: easystock_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - easystock_network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: easystock_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: easystock
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: easystock
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - easystock_network

networks:
  easystock_network:
    driver: bridge

volumes:
  db_data:
