version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: easystock_app
    restart: unless-stopped
    ports:
      - "8000:8080"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=easystock
      - DB_USERNAME=easystock
      - DB_PASSWORD=secret
    depends_on:
      - db
    networks:
      - easystock_network

  db:
    image: mysql:8.0
    container_name: easystock_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: easystock
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: easystock
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - easystock_network

networks:
  easystock_network:
    driver: bridge

volumes:
  db_data:
